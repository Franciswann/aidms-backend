services:
  postgres:
    image: postgres:16-alpine
    container_name: aidms_postgres
    environment:
      POSTGRES_USER: aidms
      POSTGRES_PASSWORD: aidms_secret
      POSTGRES_DB: aidms_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aidms -d aidms_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: